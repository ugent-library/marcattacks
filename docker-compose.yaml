services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1
    command: server /data -address ":3371" --console-address ":3372"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - 3371:3371
      - 3372:3372
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3371/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mc:
    image: minio/mc
    depends_on:
      - minio
      # minio:
      #   condition: service_healthy
    restart: on-failure
    entrypoint:
      - sh
      - -c
      - |
        sleep 2;
        mc alias set docker http://minio:3371 minioadmin minioadmin;
        mc mb docker/bbl --ignore-existing;

  sftp:
    image: atmoz/sftp:alpine
    ports:
      - 2222:22
    volumes:
      # read-only seed: the repo's sample data (client sees it under /files)
      - ./data:/home/marc/files:ro
      # writable target for write-back tests (chowned to the user by the init
      # script below, since named-volume mountpoints come up owned by root)
      - sftp-upload:/home/marc/upload
      - ./docker/sftp.d/chown-upload.sh:/etc/sftp.d/chown-upload.sh:ro
    # format: user:password:UID:GID:upload-subdir
    command: marc:marcpass:1001:1001:upload

volumes:
  minio-data:
    driver: local
  sftp-upload:
    driver: local