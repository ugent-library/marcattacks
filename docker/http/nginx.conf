server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Serve the LDP container description at the root so @latest: / @glob: work:
    # marcattacks GETs the container URL (the path before @latest:/@glob:) and
    # parses the response as RDF, reading ldp:contains / dcterms:modified.
    location = / {
        default_type text/turtle;
        root /srv;
        try_files /container.ttl =404;
    }

    # Everything else is served as a static file from the mounted data/ dir.
}
